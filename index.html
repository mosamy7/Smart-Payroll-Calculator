<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Payroll Calculator</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="dark-theme">
    <div class="wrapper animate-fade-in">
      <nav class="top-nav">
        <button id="theme-toggle" class="theme-btn">
          <i class="fas fa-sun"></i>
        </button>
        <img src="img/me pic.jpg" alt="me pic" class="user-logo" />
      </nav>

      <div class="content">
        <header>
          <h1>حاسبة المستحقات الذكية</h1>
        </header>

        <div class="card main-card">
          <div class="input-group">
            <label>الراتب الشامل (Gross Salary):</label>
            <input
              type="number"
              id="totalSalary"
              min="0"
              placeholder="أدخل المبلغ هنا..."
            />
          </div>

          <div class="input-group">
            <label>نوع القطاع المنتمي له:</label>
            <select id="sector">
              <option value="industrial">قطاع صناعي (7 ساعات عمل فعلية)</option>
              <option value="service">قطاع خدمي (8 ساعات عمل فعلية)</option>
            </select>
          </div>

          <div class="grid-inputs">
            <div class="input-group">
              <label><i class="fas fa-sun"></i> إضافي نهاري (ساعة):</label>
              <input type="number" id="dayOT" min="0" placeholder="عدد الساعات..." />
            </div>
            <div class="input-group">
              <label><i class="fas fa-moon"></i> إضافي ليلي (ساعة):</label>
              <input type="number" id="nightOT" min="0" placeholder="عدد الساعات..." />
            </div>
            <div class="input-group">
              <label
                ><i class="fas fa-calendar-day"></i> راحات أسبوعية (يوم):</label
              >
              <input type="number" id="restDays" min="0" placeholder="عدد الأيام..." />
            </div>
            <div class="input-group">
              <label><i class="fas fa-star"></i> عطلات رسمية (يوم):</label>
              <input type="number" id="holidays" min="0" placeholder="عدد الأيام ..." />
            </div>
          </div>

          <button onclick="calculate()" class="btn-calculate">
            احسب المستحقات الآن
          </button>
        </div>

        <div id="result" class="result-card" style="display: none">
          <h3><i class="fas fa-file-invoice-dollar"></i> تفصيل الحسبة:</h3>
          <div class="res-item">
            أجر اليوم: <strong id="resDaily">0.00</strong> ج.م
          </div>
          <div class="res-item">
            أجر الساعة: <strong id="resHourly">0.00</strong> ج.م
          </div>
          <hr />
          <div class="res-item">
            إجمالي إضافي نهاري: <strong id="resDayOT">0.00</strong> ج.م
          </div>
          <div class="res-item">
            إجمالي إضافي ليلي: <strong id="resNightOT">0.00</strong> ج.م
          </div>
          <div class="res-item">
            إجمالي الراحات الأسبوعية:
            <strong id="resTotalRests">0.00</strong> ج.م
          </div>
          <div class="res-item">
            إجمالي العطلات الرسمية:
            <strong id="resTotalHolidays">0.00</strong> ج.م
          </div>
          <div class="res-total">
            <span>الإجمالي النهائي الشامل:</span><br />
            <span id="resTotal">0.00</span> ج.م
          </div>
        </div>
      </div>
